{% extends 'base.html' %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-top-bar"></div>
    <div class="auth-brand">
      <div class="auth-brand-icon">
        <i class="fas fa-user-shield"></i>
      </div>
      <div>
        <div class="auth-brand-name">Disease Recognition and Test Recommendation System</div>
        <div class="auth-brand-sub">Admin Management</div>
      </div>
    </div>
    <div class="auth-form active" style="position:relative;">
      <h2 class="auth-title">Add New Admin</h2>
      <p class="auth-subtitle">Create a new admin account for the system</p>
      <form method="post">
        <div class="mb-3">
          <label for="username" class="form-label">
            <i class="fas fa-user me-1" style="color: var(--accent);"></i>Username
          </label>
          <input type="text" class="form-control" id="username" name="username" placeholder="Choose a username" required>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">
            <i class="fas fa-envelope me-1" style="color: var(--accent);"></i>Email
          </label>
          <input type="email" class="form-control" id="email" name="email" placeholder="your@email.com" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">
            <i class="fas fa-lock me-1" style="color: var(--accent);"></i>Password
          </label>
          <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-4" style="padding: 0.9rem;">
          <i class="fas fa-user-plus me-2"></i>Add Admin
        </button>
      </form>
    </div>
  </div>
</div>
<style>
.auth-container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: calc(100vh - 300px);
  padding: 3rem 1rem;
}
.auth-card {
  width: 100%;
  max-width: 460px;
  background: white;
  border-radius: 24px;
  box-shadow: 0 24px 64px rgba(15, 23, 42, 0.14);
  padding: 0;
  position: relative;
  overflow: hidden;
  border: 1px solid #e2e8f0;
}
.auth-top-bar {
  height: 4px;
  background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
  width: 100%;
}
.auth-brand {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 2rem 2.5rem 1.5rem;
  border-bottom: 1px solid #f1f5f9;
}
.auth-brand-icon {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 1.2rem;
  box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
}
.auth-brand-name {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 1.1rem;
  color: #0f172a;
  line-height: 1.1;
}
.auth-brand-sub {
  font-size: 0.75rem;
  color: #94a3b8;
  font-weight: 400;
}
.auth-form {
  opacity: 1;
  visibility: visible;
  position: relative;
  width: 100%;
  padding: 2rem 2.5rem 2.5rem;
}
.auth-title {
  font-family: 'Outfit', sans-serif;
  font-size: 1.75rem;
  font-weight: 800;
  color: #0f172a;
  margin-bottom: 0.375rem;
  letter-spacing: -0.02em;
}
.auth-subtitle {
  color: #64748b;
  margin-bottom: 1.75rem;
  font-size: 0.9rem;
}
@media (max-width: 768px) {
  .auth-card { border-radius: 20px; }
  .auth-form { padding: 1.75rem 1.5rem 2rem; }
  .auth-brand { padding: 1.75rem 1.5rem 1.25rem; }
  .auth-title { font-size: 1.5rem; }
}
</style>
{% endblock %}
